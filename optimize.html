<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Performance Report</title>
    <style>
       /* Mobile devices */
@media (max-width: 600px) {
    body {
        padding: 10px;
        align-items: flex-start;
    }

    .container {
        padding: 15px;
        border-radius: 8px;
    }

    h2 {
        font-size: 18px;
    }

    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tr {
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 10px;
        background: #fff;
    }

    td {
        padding: 6px 8px;
        text-align: right;
        position: relative;
    }

    td::before {
        content: attr(data-label);
        position: absolute;
        left: 8px;
        top: 6px;
        font-weight: bold;
        text-align: left;
    }
}

/* Tablets */
@media (min-width: 601px) and (max-width: 992px) {
    .container {
        max-width: 90%;
    }

    th, td {
        padding: 10px;
    }
}
    </style>
</head>

<body>

    <div class="container">
        <h2>Clinic Performance Report</h2>

        <table id="reportTable">
            <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Procedure</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align:right">Total Revenue:</td>
                    <td id="totalRevenue">0</td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
<script>
    const tbody = document.querySelector("#reportTable tbody");
    const totalRevenueEl = document.getElementById("totalRevenue");

    // Create summary + insights section
    const container = document.querySelector(".container");

    const summaryDiv = document.createElement("div");
    summaryDiv.style.marginTop = "20px";

    const insightsDiv = document.createElement("div");
    insightsDiv.style.marginTop = "15px";
    insightsDiv.style.background = "#eef6ff";
    insightsDiv.style.padding = "10px";
    insightsDiv.style.borderRadius = "8px";

    container.appendChild(summaryDiv);
    container.appendChild(insightsDiv);

    const firebaseURL = "https://testing-tracker-abac5-default-rtdb.firebaseio.com/patients.json";

    function fetchReport() {
        fetch(firebaseURL)
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = "";
                let totalRevenue = 0;
                let patientCount = 0;
                let procedureCount = {};

                if (data) {
                    for (let patientId in data) {
                        const p = data[patientId];

                        totalRevenue += p.total || 0;
                        patientCount++;

                        // Count procedures
                        if (p.procedure) {
                            procedureCount[p.procedure] = (procedureCount[p.procedure] || 0) + 1;
                        }

                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${patientId}</td>
                            <td>${p.name}</td>
                            <td>${new Date(p.date).toLocaleDateString()}</td>
                            <td>${p.procedure}</td>
                            <td>${p.total}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                }

                totalRevenueEl.textContent = totalRevenue;

                // ===== SUMMARY =====
                const avgRevenue = patientCount ? (totalRevenue / patientCount).toFixed(2) : 0;

                summaryDiv.innerHTML = `
                    <h3>Summary</h3>
                    <p>Total Patients: <b>${patientCount}</b></p>
                    <p>Average Revenue per Patient: <b>₹${avgRevenue}</b></p>
                `;

                // ===== OPTIMIZATION INSIGHTS =====
                let insights = [];

                // Most popular procedure
                let topProcedure = null;
                let maxCount = 0;

                for (let proc in procedureCount) {
                    if (procedureCount[proc] > maxCount) {
                        maxCount = procedureCount[proc];
                        topProcedure = proc;
                    }
                }

                if (topProcedure) {
                    insights.push(`👉 Focus more on <b>${topProcedure}</b> (most popular service).`);
                }

                if (avgRevenue < 500) {
                    insights.push("💡 Try increasing pricing or upselling additional services.");
                }

                if (patientCount < 5) {
                    insights.push("📢 Low patient count — improve marketing or offers.");
                }

                if (insights.length === 0) {
                    insights.push("✅ Performance looks good. Keep maintaining consistency.");
                }

                insightsDiv.innerHTML = `
                    <h3>Optimization Suggestions</h3>
                    <ul>
                        ${insights.map(i => `<li>${i}</li>`).join("")}
                    </ul>
                `;
            })
            .catch(err => console.error("Error fetching data:", err));
    }

    fetchReport();
</script>

</html>
